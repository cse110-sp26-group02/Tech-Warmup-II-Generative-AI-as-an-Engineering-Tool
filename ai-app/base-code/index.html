<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Machine Game</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated background wrapper -->
    <div class="bg-animation"></div>
    
    <!-- Floating embers overlay for immersion -->
    <div class="embers-container">
        <div class="ember" style="--d: 2s; --l: 10%; --s: 1.2;"></div>
        <div class="ember" style="--d: 4s; --l: 30%; --s: 0.8;"></div>
        <div class="ember" style="--d: 1s; --l: 50%; --s: 1.5;"></div>
        <div class="ember" style="--d: 5s; --l: 70%; --s: 1.0;"></div>
        <div class="ember" style="--d: 3s; --l: 90%; --s: 1.3;"></div>
    </div>

    <!-- Main wrapper for the slot machine application -->
    <main class="slot-machine-container">
        
        <!-- 3D Structural Elements -->
        <div class="machine-crown">
            <div class="gem gem-left"></div>
            <header>
                <h1>Royal Slots</h1>
            </header>
            <div class="gem gem-right"></div>
        </div>

        <div class="machine-body">
            <div class="pillar pillar-left"></div>
            
            <div class="machine-center">
                <!-- Live Status Panel for screen readers and real-time updates -->
                <div class="status-panel" aria-live="polite" aria-atomic="true">
                    <div id="status-message">Welcome, Traveler! Place thy wager.</div>
                </div>

                <!-- Display Panel: Shows player's current balance, bet, and multiplier -->
                <section class="display-panel" aria-label="Game Information">
                    <div class="info-group">
                        <span id="credit-label">Gold:</span>
                        <span id="credit-display" aria-labelledby="credit-label" role="status">0</span>
                    </div>
                    <div class="info-group">
                        <span id="current-bet-label">Wager:</span>
                        <span id="bet-display" aria-labelledby="current-bet-label" role="status">0</span>
                    </div>
                    <div class="info-group">
                        <span id="multiplier-label">Boon:</span>
                        <span id="multiplier-display" aria-labelledby="multiplier-label" role="status">1x</span>
                    </div>
                    <div class="info-group" style="display: none;">
                        <span id="bet-value-label">Bet Per Spin:</span>
                        <span id="bet-value-info" aria-labelledby="bet-value-label" role="status">10</span>
                    </div>
                </section>

                <!-- Reels Grid Container: 5x3 grid populated dynamically via JS -->
                <div class="reels-container-wrapper">
                    <section class="reels-container" aria-label="Slot Machine Reels">
                        <div id="reels-grid" class="grid-display" role="grid" aria-label="5 by 3 symbol grid">
                            <!-- Populated via JS -->
                        </div>
                        <!-- Overlay for reel spin animations and 3D curve -->
                        <div id="animation-overlay" class="animation-overlay"></div>
                    </section>
                </div>
            </div>
            
            <div class="pillar pillar-right"></div>
            
            <!-- The Lever attached to the right side of the machine body -->
            <div class="lever-mount">
                <button id="btn-lever" class="btn-lever" data-action="lever" aria-label="Pull Lever">Pull Lever</button>
            </div>
        </div>

        <div class="machine-base">
            <!-- Controls Panel: Interaction elements for the player -->
            <section class="controls-panel" aria-label="Game Controls">
                <div class="bet-control">
                    <label for="bet-amount">Wager Amount:</label>
                    <input type="range" id="bet-amount" min="1" max="100" value="10" aria-label="Select bet amount from 1 to 100" aria-valuenow="10">
                    <span id="bet-value-display" aria-live="polite">Current: 10</span>
                </div>
                
                <div class="action-buttons">
                    <button id="btn-spin" class="btn-primary" data-action="spin">SPIN</button>
                    <div id="spin-indicator" class="spin-indicator hidden" aria-live="polite" aria-atomic="true">Spinning...</div>
                </div>
                
                <div class="management-buttons">
                    <button id="btn-add-credits" class="btn-secondary" data-action="add-credits">Add Gold</button>
                    <button id="btn-cashout" class="btn-secondary" data-action="cashout">Cash Out</button>
                </div>
            </section>
        </div>

        <!-- Results Panel: Modal-style display hidden by default -->
        <section id="results-panel" class="hidden" aria-hidden="true" role="dialog" aria-labelledby="results-title">
            <h2 id="results-title">Spin Results</h2>
            <div class="result-details">
                <p>Spoils: <span id="payout-display" role="status">0</span></p>
                <p>Scatters: <span id="scatter-display" role="status">0</span></p>
                <p>Bonuses: <span id="bonus-display" role="status">0</span></p>
            </div>
            <button id="btn-close-results" class="btn-secondary" aria-label="Close Results">Continue</button>
        </section>

        <!-- Debug Panel: Hidden by default, useful for development -->
        <section id="debug-panel" class="hidden" aria-hidden="true">
            <h3>Debug Information</h3>
            <div id="debug-output"></div>
        </section>

    </main>

    <!-- JavaScript logic files -->
    <script src="slot-machine.js"></script>
    <script src="ui-controller.js"></script>
</body>
</html>
